name: smarthome
description: A new Flutter project for smart home control.
publish_to: 'none'
version: 1.0.0+1

environment:
  # Updated to Dart 3.x for compatibility with modern packages
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  pin_code_fields: ^8.0.1 # Updated for Dart 3
  flutter_secure_storage: ^9.0.0 # Latest version handles Web better
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0
  speech_to_text: ^7.3.0 
  collection: ^1.18.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Updated lints

flutter:
  uses-material-design: true